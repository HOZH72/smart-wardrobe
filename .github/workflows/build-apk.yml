name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Prebuild (generate Android native project)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_DEBUG: true

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Patch defaultConfig for arm64 only
        run: |
          echo "=== Before patch ==="
          grep -n "defaultConfig" android/app/build.gradle || true
          # Insert ndk abiFilters right after defaultConfig {
          sed -i '/defaultConfig {/a\        ndk { abiFilters \"arm64-v8a\" }' android/app/build.gradle
          echo "=== After patch ==="
          grep -A2 "defaultConfig" android/app/build.gradle || true

      - name: 🏭 Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-wardrobe-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: 📦 Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: "Smart Wardrobe v1.0.0 (build ${{ github.run_number }})"
          files: android/app/build/outputs/apk/debug/*.apk
